[package]
name = "ai"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
regex.workspace = true
async-stream.workspace = true
futures-core.workspace = true
futures-util.workspace = true
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "fs", "process", "io-util", "time"] }
once_cell = "1.19"
sha1 = "0.10"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
jsonwebtoken = "9"
uuid = { version = "1", features = ["v4"] }
thiserror = "1"

normalization-core = { path = "../normalization-core" }
gateway-protocol = { path = "../gateway-protocol" }
model-catalog-core = { path = "../model-catalog-core" }
llm-core = { path = "../llm-core" }
agent-core = { path = "../agent-core" }